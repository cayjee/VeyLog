services:
  veylog:
    build: .
    container_name: veylog
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - /var/log:/var/log:ro      # Logs du host en lecture seule
      - ./config:/app/config      # Configuration et rapports persistants
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - PORT=3000
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Requis sur Linux, inoffensif sur Windows
    restart: unless-stopped
